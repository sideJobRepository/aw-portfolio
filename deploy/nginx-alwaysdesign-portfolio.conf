# ===========================================================================
#  /etc/nginx/sites-available/alwaysdesign-portfolio.com
#
#  - 메인 도메인 : alwaysdesign-portfolio.com  → 실제 서비스
#  - 부 도메인   : www.alwaysdesign-portfolio.com,
#                  portfolio.always-design.co.kr  → 메인으로 301 redirect
#                  (이유: cross-origin 으로 인증 쿠키 손실 방지)
#
#  certbot 으로 SSL 발급 후 자동으로 80→443 리다이렉트 블록이 추가된다.
# ===========================================================================

upstream nextjs_upstream {
    server 127.0.0.1:3001;
    keepalive 32;
}

upstream springboot_upstream {
    server 127.0.0.1:8080;
    keepalive 32;
}

# ── 부 도메인: 메인 도메인으로 영구 리다이렉트 ─────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name www.alwaysdesign-portfolio.com portfolio.always-design.co.kr;
    return 301 https://alwaysdesign-portfolio.com$request_uri;
}

# ── 메인 도메인: 실제 서비스 ────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name alwaysdesign-portfolio.com;

    # 업로드 100MB 까지 허용 (백엔드 multipart 와 일치)
    client_max_body_size 110M;

    # ── 정적 업로드 파일 (S3 대체) ─────────────────────────────────
    location /files/ {
        alias /home/awdesign/uploads/;
        autoindex off;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        # 한글 파일명 대응
        charset utf-8;
        # CSP 호환: 기본 inline 표시
        add_header X-Content-Type-Options nosniff;
        try_files $uri =404;
    }

    # ── 백엔드 API ───────────────────────────────────────────────
    location /api/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_read_timeout  120s;
        proxy_send_timeout  120s;

        proxy_pass http://springboot_upstream;
    }

    # ── 프론트엔드 (Next.js) ─────────────────────────────────────
    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_pass http://nextjs_upstream;
    }

    # ── Next.js 정적 자산 캐시 ───────────────────────────────────
    location /_next/static/ {
        proxy_pass http://nextjs_upstream;
        proxy_cache_valid 200 60m;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
