spring:
  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        default_batch_fetch_size: 30
  datasource:
    driver-class-name: net.sf.log4jdbc.sql.jdbcapi.DriverSpy
    url: jdbc:log4jdbc:mysql://${DB_URL}:${DB_PORT}/PORTFOLIO
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  cache:
    cache-names: presigned
    caffeine:
      spec: expireAfterWrite=50m

  jackson:
        time-zone: Asia/Seoul

# 로컬 파일 저장소 설정
file:
  storage:
    location: ${FILE_STORAGE_LOCATION:/home/awdesign/uploads}
    base-url: ${FILE_STORAGE_BASE_URL:http://localhost:8080/files}

cors:
  url: http://localhost:3000

cookie:
  secure: false
